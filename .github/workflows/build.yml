name: 构建比尔浏览器 APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: 编译 APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 赋予 Gradle 执行权限
        run: chmod +x ./gradlew

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: 比尔浏览器-v1.0-debug.apk
          path: app/build/outputs/apk/debug/*.apk